server.port=8082
spring.application.name=server-order
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
spring.datasource.url=jdbc:h2:mem:orderdb
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
# Active la résilience pour Feign
spring.cloud.openfeign.circuitbreaker.enabled=false
feign.circuitbreaker.enabled=false
resilience4j.timelimiter.instances.default.timeout-duration=20s
# Autorise Feign ŕ attendre plus longtemps
feign.client.config.default.connect-timeout=5000
feign.client.config.default.read-timeout=5000
