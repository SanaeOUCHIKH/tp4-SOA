server.port=8080
spring.application.name=api-gateway
# Inscription ą Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Route vers Product Service
spring.cloud.gateway.routes[0].id=product-service
spring.cloud.gateway.routes[0].uri=lb://server-product
spring.cloud.gateway.routes[0].predicates[0]=Path=/products/**
spring.cloud.gateway.routes[0].filters[0]=PrefixPath=/api

# Route vers Order Service
spring.cloud.gateway.routes[1].id=order-service
spring.cloud.gateway.routes[1].uri=lb://server-order
spring.cloud.gateway.routes[1].predicates[0]=Path=/orders/**
spring.cloud.gateway.routes[1].filters[0]=PrefixPath=/api
